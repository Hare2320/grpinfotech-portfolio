<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
firebase.auth().onAuthStateChanged(function(user) {
  if (!user) {
    window.location = "login.html";
  }
});
</script>
<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
</head>
<body>

<h2>GRP Infotech - Enquiries</h2>
<div id="data"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7kYqfjUhDQfNtr-DUwwJhBO02BZrPGQY",
  authDomain: "grpinfotech-e22ca.firebaseapp.com",
  projectId: "grpinfotech-e22ca"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("enquiries").orderBy("date","desc").onSnapshot((snapshot)=>{
  let html="";
  snapshot.forEach(doc=>{
    let d = doc.data();
    html += `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;">
        <p><b>Name:</b> ${d.name}</p>
        <p><b>Phone:</b> ${d.phone}</p>
        <p><b>Message:</b> ${d.message}</p>
      </div>
    `;
  });
  document.getElementById("data").innerHTML = html;
});
</script>

</body>
</html>
