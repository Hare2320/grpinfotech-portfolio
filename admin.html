<!DOCTYPE html>
<html>
<head>
<title>GRP Infotech Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#020617;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#0f172a;
}

.logout {
  background:red;
  padding:8px 15px;
  border:none;
  color:white;
  cursor:pointer;
}

/* CONTAINER */
.container {
  padding:20px;
}

/* CARDS */
.card {
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h2>GRP Infotech Dashboard</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- STATS -->
<div class="grid">
<div class="card"><h3 id="total">0</h3><p>Total Enquiries</p></div>
<div class="card"><h3 id="today">0</h3><p>Today</p></div>
</div>

<!-- CHART -->
<canvas id="chart" style="margin-top:20px;"></canvas>

<!-- DATA -->
<h3 style="margin-top:20px;">Recent Enquiries</h3>
<div id="data"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7kYqfjUhDQfNtr-DUwwJhBO02BZrPGQY",
  authDomain: "grpinfotech-e22ca.firebaseapp.com",
  projectId: "grpinfotech-e22ca"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* 🔐 PROTECT PAGE */
auth.onAuthStateChanged(user => {
  if (!user) window.location = "login.html";
});

/* 🚪 LOGOUT */
function logout(){
  auth.signOut().then(()=>{
    window.location="login.html";
  });
}

/* 📊 LOAD DATA */
let total = 0;
let todayCount = 0;

db.collection("enquiries").orderBy("date","desc").onSnapshot(snapshot => {

  let html = "";
  total = snapshot.size;

  let dates = {};

  snapshot.forEach(doc => {
    let d = doc.data();

    /* SHOW DATA */
    html += `
      <div class="card">
        <p><b>Name:</b> ${d.name}</p>
        <p><b>Phone:</b> ${d.phone}</p>
        <p><b>Message:</b> ${d.message}</p>
      </div>
    `;

    /* COUNT TODAY */
    let today = new Date().toDateString();
    let docDate = new Date(d.date.seconds * 1000).toDateString();

    if (today === docDate) todayCount++;

    /* CHART DATA */
    let key = docDate;
    dates[key] = (dates[key] || 0) + 1;
  });

  document.getElementById("data").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("today").innerText = todayCount;

  /* CHART */
  let labels = Object.keys(dates);
  let values = Object.values(dates);

  new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Enquiries',
        data: values
      }]
    }
  });

});
</script>

</body>
</html>
